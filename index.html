<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>動詞活用ワークシート</title>
  <style>
    :root {
      --page-width: 210mm;
      --page-height: 297mm;
      --page-margin-x: 8mm;
      --page-margin-top: 11mm;
      --page-margin-bottom: 6mm;
      --border: 0.35mm solid #000;
      --font: "UDデジタル教科書体 N-R", "UD Digi Kyokasho N-R",
              "UDデジタル教科書体 NK-R", "HG教科書体",
              "BIZ UDPMincho", "Yu Mincho", serif;
      --preview-scale: 0.5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #ececec;
      color: #000;
      font-family: var(--font);
      font-weight: 500;
    }

    body { padding: 14px; }

    .toolbar {
      width: calc(var(--page-width) * var(--preview-scale));
      margin: 0 auto 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      font-family: sans-serif;
      font-weight: 400;
    }

    .toolbar label {
      font-size: 14px;
    }

    .toolbar select,
    .toolbar button {
      min-height: 34px;
      border: 1px solid #777;
      border-radius: 5px;
      background: #fff;
      padding: 6px 10px;
      font-size: 14px;
    }

    .toolbar button { cursor: pointer; }

    .answer-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }

    .answer-toggle input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .status {
      width: 100%;
      font-size: 13px;
    }

    .preview-frame {
      width: calc(var(--page-width) * var(--preview-scale));
      height: calc(var(--page-height) * var(--preview-scale));
      margin: 0 auto;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,.18);
    }

    .page {
      width: var(--page-width);
      height: var(--page-height);
      padding: var(--page-margin-top) var(--page-margin-x) var(--page-margin-bottom);
      background: #fff;
      overflow: hidden;
      transform: scale(var(--preview-scale));
      transform-origin: top left;
    }

    .sheet-header {
      height: 16mm;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      padding: 1.5mm 1mm 2.2mm;
      font-size: 5.1mm;
      line-height: 1.15;
      font-weight: 500;
    }

    .title-value {
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-top: 1mm;
    }

    .name-field {
      justify-self: center;
      display: flex;
      align-items: flex-end;
      gap: 2mm;
      white-space: nowrap;
    }

    .name-line {
      display: inline-block;
      width: 55mm;
      height: 7mm;
      border-bottom: 0.35mm solid #000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: var(--border);
      font-size: 4.65mm;
      line-height: 1.08;
      font-weight: 500;
    }

    col.prompt { width: 25%; }
    col.answer { width: 25%; }

    th, td {
      border: var(--border);
      height: 9.55mm;
      padding: 0 2.2mm;
      vertical-align: middle;
      overflow: hidden;
    }

    th {
      text-align: center;
      font-weight: 500;
    }

    .group-header { height: 10.2mm; }

    .auto,
    .answer-cell {
      text-align: left;
      white-space: nowrap;
      font-weight: 500;
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html, body {
        width: 210mm;
        height: 297mm;
        background: #fff;
      }

      body { padding: 0; }
      .toolbar { display: none !important; }

      .preview-frame {
        width: 210mm;
        height: 297mm;
        margin: 0;
        overflow: visible;
        box-shadow: none;
      }

      .page {
        width: 210mm;
        height: 297mm;
        margin: 0;
        transform: none;
        box-shadow: none;
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="worksheetSelect">教材：</label>
    <select id="worksheetSelect" aria-label="教材を選択"></select>

    <label class="answer-toggle">
      <input type="checkbox" id="showAnswers">
      <span>答えを印刷する</span>
    </label>

    <button type="button" id="printButton">印刷</button>
    <span class="status" id="status">教材一覧を読み込み中…</span>
  </div>

  <div class="preview-frame">
    <main class="page">
      <header class="sheet-header">
        <div class="title-value" data-key="title"></div>
        <div class="name-field">
          <span>氏名</span>
          <span class="name-line" aria-hidden="true"></span>
        </div>
      </header>

      <table aria-label="動詞グループ記入表">
        <colgroup>
          <col class="prompt"><col class="answer">
          <col class="prompt"><col class="answer">
        </colgroup>
        <tbody>
          <tr>
            <th colspan="2" class="group-header">Ⅰグループ</th>
            <th colspan="2" class="group-header">Ⅱグループ</th>
          </tr>
          <tr>
            <td class="auto" data-key="01"></td>
            <td class="auto" data-key="02"></td>
            <td class="auto" data-key="03"></td>
            <td class="auto" data-key="04"></td>
          </tr>

          <tr><td class="auto" data-key="05"></td><td class="answer-cell" data-answer-key="answer05"></td><td class="auto" data-key="27"></td><td class="answer-cell" data-answer-key="answer27"></td></tr>
          <tr><td class="auto" data-key="06"></td><td class="answer-cell" data-answer-key="answer06"></td><td class="auto" data-key="28"></td><td class="answer-cell" data-answer-key="answer28"></td></tr>
          <tr><td class="auto" data-key="07"></td><td class="answer-cell" data-answer-key="answer07"></td><td class="auto" data-key="29"></td><td class="answer-cell" data-answer-key="answer29"></td></tr>
          <tr><td class="auto" data-key="08"></td><td class="answer-cell" data-answer-key="answer08"></td><td class="auto" data-key="30"></td><td class="answer-cell" data-answer-key="answer30"></td></tr>
          <tr><td class="auto" data-key="09"></td><td class="answer-cell" data-answer-key="answer09"></td><td class="auto" data-key="31"></td><td class="answer-cell" data-answer-key="answer31"></td></tr>
          <tr><td class="auto" data-key="10"></td><td class="answer-cell" data-answer-key="answer10"></td><td class="auto" data-key="32"></td><td class="answer-cell" data-answer-key="answer32"></td></tr>
          <tr><td class="auto" data-key="11"></td><td class="answer-cell" data-answer-key="answer11"></td><td class="auto" data-key="33"></td><td class="answer-cell" data-answer-key="answer33"></td></tr>
          <tr><td class="auto" data-key="12"></td><td class="answer-cell" data-answer-key="answer12"></td><td class="auto" data-key="34"></td><td class="answer-cell" data-answer-key="answer34"></td></tr>
          <tr><td class="auto" data-key="13"></td><td class="answer-cell" data-answer-key="answer13"></td><td class="auto" data-key="35"></td><td class="answer-cell" data-answer-key="answer35"></td></tr>
          <tr><td class="auto" data-key="14"></td><td class="answer-cell" data-answer-key="answer14"></td><td class="auto" data-key="36"></td><td class="answer-cell" data-answer-key="answer36"></td></tr>

          <tr>
            <td class="auto" data-key="15"></td>
            <td class="answer-cell" data-answer-key="answer15"></td>
            <th colspan="2" class="group-header">Ⅲグループ</th>
          </tr>

          <tr><td class="auto" data-key="16"></td><td class="answer-cell" data-answer-key="answer16"></td><td class="auto" data-key="37"></td><td class="answer-cell" data-answer-key="answer37"></td></tr>
          <tr><td class="auto" data-key="17"></td><td class="answer-cell" data-answer-key="answer17"></td><td class="auto" data-key="38"></td><td class="answer-cell" data-answer-key="answer38"></td></tr>
          <tr><td class="auto" data-key="18"></td><td class="answer-cell" data-answer-key="answer18"></td><td class="auto" data-key="39"></td><td class="answer-cell" data-answer-key="answer39"></td></tr>
          <tr><td class="auto" data-key="19"></td><td class="answer-cell" data-answer-key="answer19"></td><td class="auto" data-key="40"></td><td class="answer-cell" data-answer-key="answer40"></td></tr>
          <tr><td class="auto" data-key="20"></td><td class="answer-cell" data-answer-key="answer20"></td><td class="auto" data-key="41"></td><td class="answer-cell" data-answer-key="answer41"></td></tr>
          <tr><td class="auto" data-key="21"></td><td class="answer-cell" data-answer-key="answer21"></td><td class="auto" data-key="42"></td><td class="answer-cell" data-answer-key="answer42"></td></tr>
          <tr><td class="auto" data-key="22"></td><td class="answer-cell" data-answer-key="answer22"></td><td class="auto" data-key="43"></td><td class="answer-cell" data-answer-key="answer43"></td></tr>
          <tr><td class="auto" data-key="23"></td><td class="answer-cell" data-answer-key="answer23"></td><td class="auto" data-key="44"></td><td class="answer-cell" data-answer-key="answer44"></td></tr>
          <tr><td class="auto" data-key="24"></td><td class="answer-cell" data-answer-key="answer24"></td><td class="auto" data-key="45"></td><td class="answer-cell" data-answer-key="answer45"></td></tr>
          <tr><td class="auto" data-key="25"></td><td class="answer-cell" data-answer-key="answer25"></td><td class="auto" data-key="46"></td><td class="answer-cell" data-answer-key="answer46"></td></tr>
          <tr><td class="auto" data-key="26"></td><td class="answer-cell" data-answer-key="answer26"></td><td class="auto" data-key="47"></td><td class="answer-cell" data-answer-key="answer47"></td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <script>
    const select = document.getElementById('worksheetSelect');
    const status = document.getElementById('status');
    const showAnswers = document.getElementById('showAnswers');

    let currentValues = {};

    function parseData(text) {
      const values = {};

      for (const rawLine of text.split(/\r?\n/)) {
        const line = rawLine.trim();
        if (!line || line.startsWith('#')) continue;

        let match = line.match(/^\[([^\]]+)\]\s*(.*)$/);
        if (match) {
          values[match[1].trim()] = match[2].trim();
          continue;
        }

        match = line.match(/^([^:：]+)\s*[:：]\s*(.*)$/);
        if (match) {
          values[match[1].trim()] = match[2].trim();
        }
      }

      return values;
    }

    function renderSheet() {
      document.querySelectorAll('[data-key]').forEach((element) => {
        const key = element.dataset.key;
        element.textContent = Object.prototype.hasOwnProperty.call(currentValues, key)
          ? currentValues[key]
          : '';
      });

      document.querySelectorAll('[data-answer-key]').forEach((element) => {
        const key = element.dataset.answerKey;
        element.textContent =
          showAnswers.checked &&
          Object.prototype.hasOwnProperty.call(currentValues, key)
            ? currentValues[key]
            : '';
      });
    }

    async function loadWorksheet(filename, label) {
      status.textContent = `${label} を読み込み中…`;

      try {
        const response = await fetch(filename, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        currentValues = parseData(await response.text());
        renderSheet();

        document.title = currentValues.title || label;
        status.textContent = `${label} を読み込みました`;
      } catch (error) {
        currentValues = {};
        renderSheet();
        status.textContent = `${filename} を読み込めませんでした`;
        console.error(error);
      }
    }

    async function loadWorksheetList() {
      try {
        const response = await fetch('files.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const files = await response.json();

        if (!Array.isArray(files) || files.length === 0) {
          throw new Error('files.json に教材が登録されていません');
        }

        select.replaceChildren();

        files.forEach((item) => {
          const option = document.createElement('option');
          option.value = item.file;
          option.textContent = item.label;
          select.appendChild(option);
        });

        const requested = new URLSearchParams(location.search).get('file');
        const initial = files.find((item) => item.file === requested) || files[0];

        select.value = initial.file;
        await loadWorksheet(initial.file, initial.label);
      } catch (error) {
        status.textContent = 'files.json を読み込めませんでした';
        console.error(error);
      }
    }

    select.addEventListener('change', async () => {
      const option = select.options[select.selectedIndex];

      const url = new URL(location.href);
      url.searchParams.set('file', option.value);
      history.replaceState(null, '', url);

      showAnswers.checked = false;
      await loadWorksheet(option.value, option.textContent);
    });

    showAnswers.addEventListener('change', renderSheet);

    document.getElementById('printButton')
      .addEventListener('click', () => window.print());

    loadWorksheetList();
  </script>
</body>
</html>
