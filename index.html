<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>動詞活用ワークシート</title>
  <style>
    :root {
      --page-width: 210mm;
      --page-height: 297mm;
      --page-margin-x: 8mm;
      --page-margin-top: 11mm;
      --page-margin-bottom: 6mm;
      --border: 0.35mm solid #000;
      --font: "UDデジタル教科書体 N-R", "UD Digi Kyokasho N-R",
              "UDデジタル教科書体 NK-R", "HG教科書体",
              "BIZ UDPMincho", "Yu Mincho", serif;
      --preview-scale: 0.5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #ececec;
      color: #000;
      font-family: var(--font);
      font-weight: 500;
    }

    body { padding: 14px; }

    .toolbar {
      width: calc(var(--page-width) * var(--preview-scale));
      margin: 0 auto 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      font-family: sans-serif;
      font-weight: 400;
    }

    .toolbar label { font-size: 14px; }

    .toolbar select,
    .toolbar button {
      min-height: 34px;
      border: 1px solid #777;
      border-radius: 5px;
      background: #fff;
      padding: 6px 10px;
      font-size: 14px;
    }

    .toolbar button { cursor: pointer; }

    .answer-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }

    .answer-toggle input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .status {
      width: 100%;
      min-height: 18px;
      font-size: 13px;
    }

    .status.error {
      color: #b00020;
      font-weight: 700;
    }

    .preview-frame {
      width: calc(var(--page-width) * var(--preview-scale));
      height: calc(var(--page-height) * var(--preview-scale));
      margin: 0 auto;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,.18);
    }

    .page {
      width: var(--page-width);
      height: var(--page-height);
      padding: var(--page-margin-top) var(--page-margin-x) var(--page-margin-bottom);
      background: #fff;
      overflow: hidden;
      transform: scale(var(--preview-scale));
      transform-origin: top left;
    }

    .sheet-header {
      height: 16mm;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      padding: 1.5mm 1mm 2.2mm;
      font-size: 5.1mm;
      line-height: 1.15;
    }

    .title-value {
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-top: 1mm;
    }

    .name-field {
      justify-self: center;
      display: flex;
      align-items: flex-end;
      gap: 2mm;
      white-space: nowrap;
    }

    .name-line {
      display: inline-block;
      width: 55mm;
      height: 7mm;
      border-bottom: 0.35mm solid #000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: var(--border);
      font-size: 4.0mm;
      line-height: 1.05;
    }




    
    col.prompt { width: 25%; }
    col.answer { width: 25%; }

    th, td {
      border: var(--border);
      height: 9.35mm;
      padding: 0 0.7mm;
      vertical-align: middle;
      overflow: hidden;
      white-space: nowrap;
    }




      table td {
      letter-spacing: -0.3mm;
    }

    
    th {
      text-align: center;
      font-weight: 500;
    }

    .group-header {
      height: 9.9mm;
      background: #eeeeee;
    }

    .example-row td {
      background: #fafafa;
    }

    .blank {
      background: #fff;
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html, body {
        width: 210mm;
        height: 297mm;
        background: #fff;
      }

      body { padding: 0; }
      .toolbar { display: none !important; }

      .preview-frame {
        width: 210mm;
        height: 297mm;
        margin: 0;
        overflow: visible;
        box-shadow: none;
      }

      .page {
        width: 210mm;
        height: 297mm;
        margin: 0;
        transform: none;
        box-shadow: none;
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label for="questionForm">問題：</label>
    <select id="questionForm" aria-label="問題の活用形"></select>

    <label for="answerForm">答え：</label>
    <select id="answerForm" aria-label="答えの活用形"></select>

    <label class="answer-toggle">
      <input type="checkbox" id="showAnswers">
      <span>答えを表示</span>
    </label>

    <button type="button" id="printButton">印刷</button>
    <span class="status" id="status">動詞マスターを読み込み中…</span>
  </div>

  <div class="preview-frame">
    <main class="page">
      <header class="sheet-header">
        <div class="title-value" id="sheetTitle">動詞活用</div>
        <div class="name-field">
          <span>氏名</span>
          <span class="name-line" aria-hidden="true"></span>
        </div>
      </header>

      <table aria-label="動詞活用記入表">
        <colgroup>
          <col class="prompt"><col class="answer">
          <col class="prompt"><col class="answer">
        </colgroup>
        <tbody id="worksheetBody"></tbody>
      </table>
    </main>
  </div>

  <script>
    const forms = [
      ["nai", "ない形"],
      ["nakatta", "なかった形"],
      ["masu", "ます形"],
      ["dictionary", "辞書形"],
      ["ba", "ば形"],
      ["negative_ba", "否定ば形"],
      ["volitional", "よう形"],
      ["te", "て形"],
      ["ta", "た形"],
      ["imperative", "命令形"],
      ["prohibitive", "禁止形"],
      ["potential", "可能形"],
      ["passive", "受け身形"],
      ["causative", "使役形"],
      ["honorific", "尊敬形"]
    ];

    const questionForm = document.getElementById("questionForm");
    const answerForm = document.getElementById("answerForm");
    const showAnswers = document.getElementById("showAnswers");
    const printButton = document.getElementById("printButton");
    const status = document.getElementById("status");
    const sheetTitle = document.getElementById("sheetTitle");
    const worksheetBody = document.getElementById("worksheetBody");

    let verbs = [];
    let lastValidQuestion = "masu";
    let lastValidAnswer = "nai";

    function fillFormSelect(select, selectedValue) {
      for (const [value, label] of forms) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        option.selected = value === selectedValue;
        select.appendChild(option);
      }
    }

    function parseMaster(text) {
      return text
        .split(/\r?\n---\r?\n/)
        .map(block => {
          const item = {};
          for (const rawLine of block.split(/\r?\n/)) {
            const line = rawLine.trim();
            if (!line || line.startsWith("#") || line.startsWith("`")) continue;
            const match = line.match(/^([^:：]+)[:：]\s*(.*)$/);
            if (match) item[match[1].trim()] = match[2].trim();
          }
          return item;
        })
        .filter(item => item.id && item.group && item.dictionary);
    }

    function displayValue(verb, field) {
      const value = verb[field];
      const reading = verb[`${field}_reading`];

      if (!value || value === "unavailable") return "－";
      if (!reading || reading === "unavailable" || value === reading) return value;
      return `${value}（${reading}）`;
    }

    function findByDictionary(dictionary) {
      return verbs.find(v => v.dictionary === dictionary);
    }

    function orderedGroup(groupNumber, exampleDictionary) {
      const group = verbs.filter(v => Number(v.group) === groupNumber);
      const example = findByDictionary(exampleDictionary);
      const rest = group.filter(v => v !== example);
      return example ? [example, ...rest] : rest;
    }

    function formLabel(value) {
      return forms.find(([key]) => key === value)?.[1] ?? value;
    }

    function makeCell(value, className = "") {
      const td = document.createElement("td");
      td.className = className;
      td.textContent = value;
      return td;
    }

    function renderWorksheet() {
      const questionKey = questionForm.value;
      const answerKey = answerForm.value;

      if (questionKey === answerKey) {
        status.textContent = "問題と答えに同じ活用形は選べません。";
        status.classList.add("error");
        questionForm.value = lastValidQuestion;
        answerForm.value = lastValidAnswer;
        return;
      }

      lastValidQuestion = questionKey;
      lastValidAnswer = answerKey;
      status.textContent = `全43語：${formLabel(questionKey)} → ${formLabel(answerKey)}`;
      status.classList.remove("error");
      sheetTitle.textContent = `${formLabel(questionKey)} → ${formLabel(answerKey)}`;
      showAnswers.checked = false;

      const group1 = orderedGroup(1, "書く");
      const group2 = orderedGroup(2, "食べる");
      const group3 = verbs.filter(v => Number(v.group) === 3);

      worksheetBody.replaceChildren();

      const header = document.createElement("tr");
      const h1 = document.createElement("th");
      h1.colSpan = 2;
      h1.className = "group-header";
      h1.textContent = "Ⅰグループ";
      const h2 = document.createElement("th");
      h2.colSpan = 2;
      h2.className = "group-header";
      h2.textContent = "Ⅱグループ";
      header.append(h1, h2);
      worksheetBody.appendChild(header);

      const topRows = 20;
      for (let i = 0; i < topRows; i++) {
        const tr = document.createElement("tr");
        if (i === 0) tr.className = "example-row";

        const leftVerb = group1[i];
        const rightVerb = group2[i];

        tr.appendChild(makeCell(leftVerb ? displayValue(leftVerb, questionKey) : ""));
        tr.appendChild(makeCell(
          leftVerb && (i === 0 || showAnswers.checked) ? displayValue(leftVerb, answerKey) : "",
          "answer-cell"
        ));
        tr.appendChild(makeCell(rightVerb ? displayValue(rightVerb, questionKey) : "", rightVerb ? "" : "blank"));
        tr.appendChild(makeCell(
          rightVerb && (i === 0 || showAnswers.checked) ? displayValue(rightVerb, answerKey) : "",
          rightVerb ? "answer-cell" : "blank"
        ));
        worksheetBody.appendChild(tr);
      }

      const group3Header = document.createElement("tr");
      const h3 = document.createElement("th");
      h3.colSpan = 2;
      h3.className = "group-header";
      h3.textContent = "Ⅲグループ";
      group3Header.appendChild(h3);
      group3Header.appendChild(makeCell("", "blank"));
      group3Header.appendChild(makeCell("", "blank"));
      worksheetBody.appendChild(group3Header);

      for (const verb of group3) {
        const tr = document.createElement("tr");
        tr.appendChild(makeCell(displayValue(verb, questionKey)));
        tr.appendChild(makeCell(showAnswers.checked ? displayValue(verb, answerKey) : "", "answer-cell"));
        tr.appendChild(makeCell("", "blank"));
        tr.appendChild(makeCell("", "blank"));
        worksheetBody.appendChild(tr);
      }
    }

    function refreshAnswersOnly() {
      const questionKey = questionForm.value;
      const answerKey = answerForm.value;
      const group1 = orderedGroup(1, "書く");
      const group2 = orderedGroup(2, "食べる");
      const group3 = verbs.filter(v => Number(v.group) === 3);
      const rows = worksheetBody.querySelectorAll("tr");

      for (let i = 0; i < 20; i++) {
        const cells = rows[i + 1]?.children;
        if (!cells) continue;
        const leftVerb = group1[i];
        const rightVerb = group2[i];

        cells[1].textContent = leftVerb && (i === 0 || showAnswers.checked)
          ? displayValue(leftVerb, answerKey) : "";
        cells[3].textContent = rightVerb && (i === 0 || showAnswers.checked)
          ? displayValue(rightVerb, answerKey) : "";
      }

      for (let i = 0; i < group3.length; i++) {
        const cells = rows[22 + i]?.children;
        if (cells) cells[1].textContent = showAnswers.checked
          ? displayValue(group3[i], answerKey) : "";
      }
    }

    async function initialize() {
      fillFormSelect(questionForm, "masu");
      fillFormSelect(answerForm, "nai");

      try {
        const response = await fetch("verb-master.md", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        verbs = parseMaster(await response.text());

        if (verbs.length !== 43) {
          throw new Error(`動詞数が43語ではありません（${verbs.length}語）`);
        }

        renderWorksheet();
      } catch (error) {
        status.textContent = `読み込みエラー：${error.message}`;
        status.classList.add("error");
      }
    }

    questionForm.addEventListener("change", renderWorksheet);
    answerForm.addEventListener("change", renderWorksheet);
    showAnswers.addEventListener("change", refreshAnswersOnly);
    printButton.addEventListener("click", () => window.print());

    initialize();
  </script>
</body>
</html>
